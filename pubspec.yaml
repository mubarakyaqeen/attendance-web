name: student_attendance_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.66.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  pdf: ^3.10.7
  printing: ^5.12.0
  http: ^1.2.1
  geolocator: ^11.0.0
  local_auth: ^2.2.0
  image_picker: ^1.2.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/

flutter_native_splash:
  color: "#0F6B4F"
  image: assets/images/yabatech_logo.png
  android: true
  ios: true
  android_gravity: center
  fullscreen: true


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"